[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "dash-agents"
version = "0.1.0"
description = "DASH agent framework (scaffold)"
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.10.0",
]

[project.optional-dependencies]
dev = ["pytest>=8.3.0", "ruff>=0.8.0"]

[tool.hatch.build.targets.wheel]
packages = ["dash_agents"]
